services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/app
      - DATA_DIR=/app/data
      - TRANSFORMERS_OFFLINE=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/docs')"]
      interval: 10s
      timeout: 3s
      retries: 10

  ui:
    build:
      context: .
      dockerfile: Dockerfile.iu
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8080
    command: streamlit run app/ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
