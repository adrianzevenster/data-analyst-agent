services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    # Run as the host user (defaults to a common first-user uid/gid) so
    # anything written through the bind-mounted ./data volume - trained
    # models, uploads, indexes - stays owned by you, not root. Override
    # with `UID=$(id -u) GID=$(id -g) docker compose up` if yours differ.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/app/.cache/huggingface
    environment:
      - PYTHONPATH=/app
      - DATA_DIR=/app/data
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_OFFLINE=1
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-32B}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - LLM_MAX_TOOL_CALLS=${LLM_MAX_TOOL_CALLS:-4}
      - LLM_ANALYSIS_SAMPLE_ROWS=${LLM_ANALYSIS_SAMPLE_ROWS:-5000}
      - LLM_ANALYSIS_PREVIEW_ROWS=${LLM_ANALYSIS_PREVIEW_ROWS:-5}
      - LLM_ANALYSIS_MAX_COLUMNS=${LLM_ANALYSIS_MAX_COLUMNS:-80}
      - LLM_RAG_MAX_CHUNKS=${LLM_RAG_MAX_CHUNKS:-6}
      - LLM_RAG_MAX_CHARS_PER_CHUNK=${LLM_RAG_MAX_CHARS_PER_CHUNK:-1200}
      - LLM_RAG_MIN_SCORE=${LLM_RAG_MIN_SCORE:-0.25}
      - LLM_JUDGE_SAMPLE_RATE=${LLM_JUDGE_SAMPLE_RATE:-1.0}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/docs')"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
