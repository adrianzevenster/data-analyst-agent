[pytest]
pythonpath = .
testpaths = tests
markers =
    llm_eval: deterministic golden-query eval against a live LLM server (requires LLM_ENABLED=true). Run with: pytest -m llm_eval
    rag_eval: recall@k/precision@k eval against a fixture RAG corpus (downloads/loads the embedding model). Run with: pytest -m rag_eval
addopts = -m "not llm_eval and not rag_eval"
