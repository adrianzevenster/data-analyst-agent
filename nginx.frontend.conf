server {
    listen 80;
    server_name _;

    # Allow uploads up to 200 MB (nginx default is 1 MB)
    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* calls to the FastAPI backend (strip /api prefix)
    location /api/ {
        proxy_pass         http://api:8080/;
        proxy_http_version 1.1;

        # Required for SSE streaming — disable buffering so events arrive
        # immediately rather than being held until the buffer fills
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     310s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Connection        '';
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long-lived cache (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
